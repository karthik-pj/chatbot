{% extends 'base.html' %}

{% block title %}Vivid AI Assistant{% endblock %}

{% block content %}
<div class="chat-container">
    <header class="chat-header">
        <h1>Welcome to Vivid AI</h1>
        <p>I'm your dedicated company assistant.</p>
    </header>
    
    <div id="chat-messages" class="chat-messages">
        <!-- Messages will appear here -->
        <div class="message assistant">
            <div class="message-bubble">Hello! How can I help you with our company today?</div>
        </div>
    </div>
    
    <div class="chat-input-area">
        <form id="chat-form">
            <input type="text" id="chat-input" placeholder="Type your message here..." autocomplete="off" required>
            <button type="submit" id="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor"/>
                </svg>
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
